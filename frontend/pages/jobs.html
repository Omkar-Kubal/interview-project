<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Job Board - TalentWaveIT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5925f4",
                        "primary-dark": "#3f1ab0",
                        "primary-light": "#e0d6fd",
                        "background-light": "#f6f5f8",
                        "background-dark": "#141022",
                        "surface-light": "#ffffff",
                        "surface-dark": "#1e1a2e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <!-- Navbar -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-surface-light dark:bg-surface-dark px-6 lg:px-10 py-3 shadow-sm">
        <div class="flex items-center gap-4 text-primary cursor-pointer" onclick="window.location.href='/'">
            <div class="size-8 flex items-center justify-center rounded-lg bg-primary/10 text-primary">
                <span class="material-symbols-outlined text-2xl">bubble_chart</span>
            </div>
            <h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-[-0.015em]">TalentWaveIT
            </h2>
        </div>
        <div class="hidden lg:flex flex-1 justify-end gap-8">
            <nav class="flex items-center gap-9">
                <a class="text-primary text-sm font-bold leading-normal transition-colors" href="/jobs">Find Jobs</a>
                <a id="nav-dashboard"
                    class="hidden text-slate-600 dark:text-slate-300 hover:text-primary text-sm font-medium leading-normal transition-colors"
                    href="/dashboard">Dashboard</a>
                <a id="nav-profile"
                    class="hidden text-slate-600 dark:text-slate-300 hover:text-primary text-sm font-medium leading-normal transition-colors"
                    href="/profile">Profile</a>
                <a id="nav-settings"
                    class="hidden text-slate-600 dark:text-slate-300 hover:text-primary text-sm font-medium leading-normal transition-colors"
                    href="/settings">Settings</a>
            </nav>
            <div class="flex items-center gap-4">
                <div id="auth-section" class="flex gap-3">
                    <button onclick="window.location.href='/login'"
                        class="flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-surface-light dark:bg-surface-dark border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-900 dark:text-white text-sm font-bold leading-normal transition-colors">
                        <span class="truncate">Sign In</span>
                    </button>
                    <button onclick="window.location.href='/register'"
                        class="flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary hover:bg-primary-dark text-white text-sm font-bold leading-normal shadow-md shadow-primary/20 transition-colors">
                        <span class="truncate">Get Started</span>
                    </button>
                </div>
                <div id="authenticated-section" class="hidden flex items-center gap-4">
                    <button onclick="sessionStorage.clear(); window.location.reload();"
                        class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-9 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white hover:bg-slate-50 dark:hover:bg-slate-700 text-sm font-bold leading-normal tracking-[0.015em] transition-colors">
                        <span class="truncate">Logout</span>
                    </button>
                    <div id="user-avatar"
                        class="size-10 rounded-full bg-primary flex items-center justify-center text-white font-bold ring-2 ring-primary/20 uppercase">
                        UN
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Main Content -->
    <main class="flex flex-1 flex-col max-w-[1440px] mx-auto w-full px-4 md:px-6 lg:px-8 py-8">
        <!-- Hero Search Section -->
        <div
            class="mb-10 w-full rounded-2xl bg-gradient-to-r from-primary to-[#7c4dff] p-8 md:p-12 text-center shadow-lg shadow-primary/25 relative overflow-hidden">
            <div
                class="absolute top-0 left-0 w-64 h-64 bg-white opacity-5 rounded-full -translate-x-1/2 -translate-y-1/2">
            </div>
            <div
                class="absolute bottom-0 right-0 w-96 h-96 bg-white opacity-5 rounded-full translate-x-1/3 translate-y-1/3">
            </div>
            <h1 class="text-white text-3xl md:text-4xl lg:text-5xl font-bold mb-4 relative z-10">Find your next dream
                role</h1>
            <p class="text-white/80 text-lg mb-8 max-w-2xl mx-auto relative z-10">Browse thousands of job openings from
                top AI companies and startups.</p>
            <div
                class="relative z-10 mx-auto flex max-w-4xl flex-col md:flex-row gap-2 rounded-xl bg-surface-light dark:bg-surface-dark p-2 shadow-xl">
                <div
                    class="flex flex-1 items-center gap-2 rounded-lg bg-slate-50 dark:bg-slate-800/50 px-3 py-2 border border-transparent focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-all">
                    <span class="material-symbols-outlined text-slate-400">search</span>
                    <input id="search-keyword"
                        class="w-full bg-transparent border-none p-0 text-slate-900 dark:text-white placeholder:text-slate-400 focus:ring-0 text-base"
                        placeholder="Job title, keywords, or company" type="text" />
                </div>
                <button id="btn-search"
                    class="bg-primary hover:bg-primary-dark text-white rounded-lg px-8 py-3 font-semibold transition-colors shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    Search Jobs
                </button>
            </div>
        </div>
        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sidebar Filters (Static for now) -->
            <aside class="w-full lg:w-64 flex-shrink-0 space-y-6">
                <div
                    class="bg-surface-light dark:bg-surface-dark rounded-xl p-5 border border-slate-200 dark:border-slate-800 shadow-sm">
                    <h3 class="font-bold text-slate-900 dark:text-white text-sm uppercase tracking-wider mb-4">Domain
                    </h3>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input checked=""
                                class="rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary bg-slate-50 dark:bg-slate-800"
                                type="checkbox" />
                            <span class="text-sm text-slate-600 dark:text-slate-400">All Categories</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input
                                class="rounded border-slate-300 dark:border-slate-600 text-primary focus:ring-primary bg-slate-50 dark:bg-slate-800"
                                type="checkbox" />
                            <span class="text-sm text-slate-600 dark:text-slate-400">Engineering</span>
                        </label>
                    </div>
                </div>
            </aside>
            <!-- Job Grid -->
            <div class="flex-1">
                <div class="flex items-center justify-between mb-6">
                    <h2 id="results-count" class="text-xl font-bold text-slate-900 dark:text-white">Detecting Jobs...
                    </h2>
                </div>
                <div id="jobs-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Dynamic Cards -->
                </div>
            </div>
        </div>
    </main>
    <script>
        const jobsContainer = document.getElementById('jobs-container');
        const resultsCount = document.getElementById('results-count');
        const searchKeyword = document.getElementById('search-keyword');
        const btnSearch = document.getElementById('btn-search');

        const user = JSON.parse(sessionStorage.getItem('user'));
        const token = sessionStorage.getItem('token');

        if (token && user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('authenticated-section').classList.remove('hidden');
            document.getElementById('nav-dashboard').classList.remove('hidden');
            document.getElementById('nav-profile').classList.remove('hidden');
            document.getElementById('nav-settings').classList.remove('hidden');
            document.getElementById('user-avatar').innerText = user.full_name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        async function fetchJobs() {
            try {
                const response = await fetch('/api/jobs');
                const jobs = await response.json();
                renderJobs(jobs);
            } catch (error) {
                console.error(error);
                jobsContainer.innerHTML = '<div class="col-span-full py-20 text-center text-red-500">Failed to load jobs</div>';
            }
        }

        function renderJobs(jobs) {
            const query = searchKeyword.value.toLowerCase();
            const filtered = jobs.filter(j => j.title.toLowerCase().includes(query) || j.description.toLowerCase().includes(query));

            resultsCount.innerText = `${filtered.length} Jobs Found`;

            if (filtered.length === 0) {
                jobsContainer.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold uppercase tracking-widest text-sm">No matching positions detected</div>';
                return;
            }

            jobsContainer.innerHTML = filtered.map(job => `
            <div class="group flex flex-col bg-surface-light dark:bg-surface-dark rounded-2xl border border-slate-200 dark:border-slate-800 p-6 hover:shadow-2xl hover:shadow-primary/5 hover:-translate-y-1 transition-all duration-300 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-primary opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="flex items-start justify-between mb-4">
                    <div class="size-12 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined text-3xl">work</span>
                    </div>
                </div>
                <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1 group-hover:text-primary transition-colors">${job.title}</h3>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Open Position</p>
                <div class="flex flex-wrap gap-2 mb-4">
                    <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest bg-slate-100 dark:bg-slate-800 text-slate-500">${job.location || 'Remote'}</span>
                </div>
                <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-3 mb-8 flex-grow">
                    ${job.description}
                </p>
                <button onclick="window.location.href='/apply?job_id=${job.id}'" class="w-full py-3 rounded-xl bg-primary hover:bg-primary-dark text-white font-bold text-sm transition-all shadow-lg shadow-primary/20 hover:shadow-primary/40">
                    Apply Now
                </button>
            </div>
        `).join('');
        }

        btnSearch.addEventListener('click', fetchJobs);
        searchKeyword.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchJobs(); });

        fetchJobs();
    </script>
</body>

</html>
